; ============================================================
;  CustomTalismanEffects
;
;  Set a talisman to 1 to apply its effects to your character passively
;
;  Changes made in the in-game overlay are saved automatically when you
;  close the panel, or manually via the "Save to .ini" button.
; ============================================================

[overlay]
toggle_key = Insert ; key to open/close the in-game panel
toggle_gamepad_combo = L3+R3
;   Controller combo to open/close (buttons joined with +)
;   Available buttons: A B X Y  LB RB  L3 R3  Start Back  Up Down Left Right
;   Examples: L3+R3   LB+RB   Back+Start   Y+R3

allow_stacking = 0 ; 1 = ignore talisman families (stack anything)
show_descriptions = 1 ; 1 = show the effect description pane at the bottom of the overlay
sort_mode = 2 ; talisman list order in the overlay: 0 = Talisman ID, 1 = Name (A-Z), 2 = In-game menu order

