; ============================================================
;  OmniCaster settings
;  Keep this file next to OmniCaster.dll. Lines starting with ';' are
;  comments; edit the values after the '=' signs.
; ============================================================

[general]
; Let every staff and sacred seal cast BOTH sorceries and incantations.
;   1 = on, 0 = off
cast_anything = 1

; Controls how spell damage is calculated. Pick ONE of these:
;
;   off          - Use the game's normal scaling. Sorceries use Sorcery Scaling,
;                  incantations use Incant Scaling, just like vanilla.
;
;   equipped     - All spells use the scaling of your currently equipped
;                  catalyst. If you're holding a staff, both sorceries and
;                  incantations use that staff's scaling. If you're holding a
;                  sacred seal, both spell types use the seal's scaling.
;
;   highest_stat - Every catalyst automatically uses your highest casting stat
;                  (Intelligence or Faith). For example, if you have 90 INT and
;                  20 FAI, even a sacred seal will scale from Intelligence.
;                  If Faith becomes higher, everything will scale from Faith
;                  instead.
scaling_mode = highest_stat

[debugging]
debug_console = 0
dump = 1 ; writes a log file with everything changed.
