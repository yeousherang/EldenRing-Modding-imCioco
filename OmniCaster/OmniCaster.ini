; ============================================================
;  OmniCaster settings
;  Keep this file next to OmniCaster.dll. Lines starting with ';' are
;  comments; edit the values after the '=' signs.
; ============================================================

[general]
; Let every staff and sacred seal cast BOTH sorceries and incantations.
;   1 = on, 0 = off
cast_anything = 1

; How strong your spells are. Pick ONE of these three:
;
;   equipped     - (recommended) Your spells are as strong as the catalyst in
;                  your hand. Holding a staff? Incantations hit as hard as your
;                  sorceries do. Holding a seal? Sorceries hit as hard as your
;                  incantations do. Upgrading the catalyst helps everything.
;
;   highest_stat - Look at your Intelligence and your Faith, take whichever is
;                  higher, and use THAT for all spell damage, on every staff
;                  and seal. Great for playing one caster stat and ignoring
;                  the other. Updates by itself when you level up or respec.
;
;   off          - Don't touch damage at all. You can still cast everything
;                  (see cast_anything), but "wrong" combinations such as an
;                  incantation from a staff will deal almost no damage.
scaling_mode = highest_stat

[debugging]
; 1 = also open a console window that shows what the mod is doing.
debug_console = 0
; 1 = write a detailed report to logs\OmniCaster.log: every staff/seal that
; was changed (by name) and, in highest_stat mode, the stats that were read.
dump = 1
