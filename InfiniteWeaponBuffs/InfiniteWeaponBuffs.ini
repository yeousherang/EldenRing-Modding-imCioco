; ============================================================
;  ER Infinite Weapon Buffs -- configuration
;  Keep this file next to InfiniteWeaponBuffs.dll (same base name).
; ============================================================

[general]
; Open a debug console window in addition to the log file. 1=on, 0=off.
debug_console = 0

; Make EVERY weapon accept greases and spell buffs
; (EquipParamWeapon.isEnhance on all rows). 1=on, 0=off.
all_weapons_buffable = 1

; ------------------------------------------------------------
;  Buff durations, per category. The mod finds the SpEffects for
;  each category automatically from the game's params -- there are
;  no ID lists to maintain.
;
;  duration = seconds, or "infinite" (= permanent / -1).
; ------------------------------------------------------------

[greases]
enabled  = 1
duration = infinite

[spell_buffs]
enabled  = 1
duration = infinite

[consumables]
enabled  = 1
duration = 300

; ------------------------------------------------------------
;  EXPERIMENTAL. Default OFF -- only affects the buffs this mod already manages
;  (greases / spell buffs / consumables). Plain param edit, so test in-game.
; ------------------------------------------------------------

[stacking]
; Let managed buffs coexist instead of overwriting each other (zeros
; SpEffectParam.spCategory, removing mutual exclusion). Lets you stack buffs
; that normally replace one another. 1 = on, 0 = off.
no_overwrite = 0

[discover]
; Diagnostic only: when 1, dump every goods/magic -> SpEffect reference
; to the log and change nothing. Normally leave at 0.
dump = 0

[advanced]
; Which EquipParamGoods.goodsType numbers count as each category
; (10 = greases, 0 = normal consumables, 3 = physick tears). Taken from
; the discovery dump -- only change if a future patch shifts them.
grease_goods_types     = 10
consumable_goods_types = 0,3

; Only change SpEffects that already run on a finite timer, so instant
; heals, passives and already-permanent effects are left alone. 1 = recommended.
only_timed_effects = 1
