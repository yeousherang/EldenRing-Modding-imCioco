; ============================================================
;  InfiniteWeaponBuffs configuration
;  duration = seconds, or "infinite" (= permanent / -1).
; ============================================================

[general]
; Make EVERY weapon accept greases and spell buffs
; (EquipParamWeapon.isEnhance on all rows). 1=on, 0=off.
all_weapons_buffable = 1

; Extra EquipParamGoods ids (NOT category numbers) to treat as buff consumables,
; comma-separated. Unioned with the built-in defaults (incl. the DLC Golden Vow
; pot). Leave empty unless an item is missed.
extra_goods =

; ------------------------------------------------------------
;  Buff categories. Each: enabled (1/0) + duration.
; ------------------------------------------------------------

[greases]
enabled  = 1
duration = 300

[spell_buffs]
enabled  = 1
duration = infinite

[consumables]
enabled  = 1
duration = infinite

[ashes_of_war]
; Weapon-skill (Ash of War) self-buffs, e.g. Determination, Royal Knight's
; Resolve, Golden Vow. Only positive self-buffs are extended; debuffs and
; system/state effects are filtered out automatically.
enabled  = 1
duration = infinite
; The built-in defaults already cover the common self-buff arts (Roar, Endure,
; Barbaric Roar, Determination, Royal Knight's Resolve, Golden Vow, War Cry,
; Braggart's Roar, Jellyfish Shield). Use speffect_ids to add more (e.g. DLC or
; weapon-enchant arts like Cragblade): comma-separated SpEffect ids, unioned with
; the defaults. Find ids in soulsmods/Paramdex (ER SpEffectParam names); dump=1
; reports which allowlisted ids actually apply on your game version.
speffect_ids =

; ------------------------------------------------------------

[stacking]
; Let managed buffs coexist instead of overwriting each other.
; Lets you stack buffs that normally replace one another. 1 = on, 0 = off.
stacking_bonuses = 0

[dual_wield]
; Apply weapon buffs (greases + weapon-skill enchants) to BOTH hands when
; dual-wielding. Experimental. See README for scope/limits. 1 = on, 0 = off.
mirror_to_offhand = 0
; Optional extra right:left SpEffect id pairs, comma-separated (e.g. for mods).
extra_pairs =

[discover]
; Diagnostic only (patches nothing): logs how every category resolves, which
; effects are protected/excluded, and candidate ids -- for finding missed items.
dump = 1
; Mirror the log to a console window in addition to the log file. 1=on, 0=off.
debug_console = 0
