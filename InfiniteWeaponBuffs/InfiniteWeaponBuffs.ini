[general]
; Make every weapon accept greases and spell buffs. 1=on, 0=off.
all_weapons_buffable = 1

; Extra EquipParamGoods ids (NOT category numbers) to treat as buff consumables.
extra_goods =

[stacking]
; Lets you stack buffs that normally replace one another. 1 = on, 0 = off.
stacking_bonuses = 0

[dual_wield]
; Apply weapon buffs (greases + weapon-skill enchants) to BOTH hands when dual-wielding. 1 = on, 0 = off.
mirror_to_offhand = 1
; Optional extra right:left SpEffect id pairs (in case you find something that doesn't work, it can be added manually here)
; Example: extra_pairs = 1755:1758, 1821:1823
extra_pairs =

; a list of all ids can be found here: https://github.com/soulsmods/Paramdex/blob/ff7245e524329bc3eab00036723d2bd53384cedf/ER/Names/SpEffectParam.txt

; ------------------------------------------------------------
;  Buff categories. Each: enabled (1=on, 0=off.) + duration (seconds, or "infinite").
; ------------------------------------------------------------

[greases]
enabled  = 1
duration = 600

[spell_buffs]
enabled  = 1
duration = infinite

[consumables]
enabled  = 1
duration = infinite

[ashes_of_war]
enabled  = 1
duration = 600
speffect_ids = 1821, 1823, 1826, 1828, 1841, 1843, 1845, 1846, 1847, 1848
; if you find and ash of war for which the config doesn't work, you can manually add it here.
; a list of all ids can be found here: https://github.com/soulsmods/Paramdex/blob/ff7245e524329bc3eab00036723d2bd53384cedf/ER/Names/SpEffectParam.txt
; simply look for the effect that you want
; example: speffect_ids = 1821, 1823, 1826, 1828
; above example includes the effects of the AoW "Cragblade"

; By default only positive self-buffs are extended; debuffs and
; system/state effects are filtered out automatically.

; ------------------------------------------------------------
[discover]
dump = 0
; opens a console window. 1=on, 0=off.
debug_console = 0
