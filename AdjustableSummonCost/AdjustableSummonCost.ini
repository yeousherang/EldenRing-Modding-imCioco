; ============================================================
;  Adjustable Summon Cost -- configuration
;  Keep this file next to AdjustableSummonCost.dll (same base name).
; ============================================================

[general]
; Open a debug console window in addition to the log file. 1=on, 0=off.
debug_console = 0

[summons]
; Divide every spirit-ash summon's FP cost (and HP cost, for the few
; that use HP) by this number. 3 = a third of the cost, 2 = half, etc.
; 1 = no change. Decimals are allowed (e.g. 1.5).
divisor = 3

[advanced]
; Which EquipParamGoods.goodsType numbers are spirit summons.
; 7 and 8 cover base game + DLC ashes. Change only if a patch shifts them.
summon_goods_types = 7,8

; Never let a cost drop below this (so summons aren't fully free). 1 = recommended.
min_cost = 1

; Log every summon's before/after FP/HP cost to the log file (useful to
; verify against the in-game menu). 1=on, 0=off (just a summary line).
log_each = 0
