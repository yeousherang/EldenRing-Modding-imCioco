; ============================================================
;  PersistentBuffs -- configuration
;  Keep this file next to PersistentBuffs.dll (same base name).
;
;  STATUS: work in progress. This is a runtime (hook/memory) mod, not a
;  param patcher. It re-applies your active buffs after the engine wipes
;  them on fast travel / death. See README.md and CLAUDE.md.
; ============================================================

[general]
; Open a debug console window in addition to the log file. 1=on, 0=off.
debug_console = 0

[persistence]
; Re-apply buffs after a fast travel (map change while alive). 1=on, 0=off.
keep_after_fast_travel = 1

; Re-apply buffs after death/respawn. 1=on, 0=off.
keep_after_death = 1

; Wait this many milliseconds after a transition finishes (player reappears)
; before re-applying, so the character is fully loaded and the engine's wipe has
; already happened. Raise it if buffs occasionally fail to stick after a load.
reapply_delay_ms = 500

[weapon_memory]
; EXPERIMENTAL. Remember which weapon-bound buffs (greases, blade spells) were on
; each right-hand weapon and re-apply them when you swap back to that weapon --
; vanilla drops them on a weapon swap. Body buffs (Golden Vow, consumables) are
; untouched. Right-hand slots only for now. 1=on, 0=off.
remember_per_weapon = 0
