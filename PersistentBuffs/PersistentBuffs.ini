[persistence]
; Re-apply buffs after a fast travel (map change while alive). 1=on, 0=off.
keep_after_fast_travel = 1

; Re-apply buffs after death/respawn. 1=on, 0=off.
keep_after_death = 1

; Wait this many milliseconds after a transition finishes (player reappears)
; before re-applying, so the character is fully loaded and the engine's wipe has
; already happened.
reapply_delay_ms = 500

; Extra SpEffect ids to NEVER persist, on top of the built-in system blocklist
exclude_ids =

[weapon_memory]
; Remember which weapon-bound buffs (greases, blade spells) were on
; each weapon and re-apply them when you swap back to that weapon
; 1=on, 0=off.
remember_per_weapon = 1

; SpEffect ids treated as CHARACTER-WIDE instead of weapon-bound for Ashes-of-War
always_persist_ids = 841,843,846,848,1586,1588,1650,1651,1655,1656,1681,1683,1686,1688,1691,1693,1696,1698,1701,1703,1706,1708,1730,1732,1811,1813,1816,1818,1861,1863,1866,1868


[general]
; Open a debug console window in addition to the log file. 1=on, 0=off.
debug_console = 0

; Diagnostic: log every SpEffect id that appears/disappears on the player (raw).
; keep this on, so I can fix possible bugs if something doesn't work properly.
log_effects = 1