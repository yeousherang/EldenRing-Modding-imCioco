[persistence]
; Re-apply buffs after a fast travel. 1=on, 0=off.
keep_after_fast_travel = 1

; Re-apply buffs after death/respawn. 1=on, 0=off.
keep_after_death = 1

; if you find any effect being disabled after death or travelling, you can include it below and it will persist next time.
; a list of effects can be found here: https://github.com/soulsmods/Paramdex/blob/ff7245e524329bc3eab00036723d2bd53384cedf/ER/Names/SpEffectParam.txt
; example: force_persist_ids = 1821, 1823, 1826, 1828
; above example is "Cragblade"
force_persist_ids =

; Restore buffs with their REMAINING time instead of a fresh full duration.
; The mod tracks how long each buff has been active (time is paused while a
; buff is stripped by death/loading). Expired buffs are never re-applied.
; 1=on, 0=off.
restore_remaining_time = 1

[weapon_memory]
; Remember which weapon-bound buffs (greases, blade spells) were on
; each weapon and re-apply them when you swap back to that weapon
; 1=on, 0=off.
; The bindings are also saved to PersistentBuffs.state.ini (per character),
; so a game restart doesn't erase buffs parked on a stowed weapon; they are
; restored on the next launch when remember_across_sessions (below) is on.
remember_per_weapon = 1

[session]
; EXPERIMENTAL: save your active buffs (with remaining time) to
; PersistentBuffs.state.ini next to the DLL, and restore them on the next
; game launch for the same character -- buffs continue where they left off
; (time does not pass while the game is closed; infinite buffs stay
; infinite). Keyed by character name. 1=on, 0=off.
remember_across_sessions = 0

[general]
; Open a debug console. 1=on, 0=off.
debug_console = 0

; Diagnostic: log every SpEffect id that appears/disappears on the player.
; keep this on, so I can fix possible bugs if something doesn't work properly.
log_effects = 1
